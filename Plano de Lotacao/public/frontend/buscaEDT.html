<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Plano</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header-bar"></header>

  <main class="content-wrapper">
    <div class="logo-container logo-container-login">
      <img src="images/bosch-logo.d801fe2509a37d2d.svg" alt="Bosch Logo" class="logo">
      <img src="images/LogoSENNACONNECT.png" alt="Senna Connect" class="logo-senna">
    </div>

    <section class="form-section busca-plano-section">
      <div class="large-card list-container">
        <div class="search-section search-section-in-card">
          <label for="search-input" class="search-label">Buscar Plano:</label>
          <div class="search-bar-wrapper search-bar-inline">
            <input type="text" id="search-input" placeholder="Digite o código do plano..." class="form-input" maxlength="20">
          </div>
          <p id="mensagem-form" class="mensagem-form"></p>
        </div>

        <div id="lista-planos-content" class="plan-list"></div>
      </div>
    </section>
  </main>

  <footer class="footer-left footer-static">
    <button id="btn-voltar-menu" class="btn-voltar" type="button">Voltar</button>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
