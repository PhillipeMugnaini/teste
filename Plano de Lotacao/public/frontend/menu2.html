<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Lotação - Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header-bar"></header>

  <nav>
    <figure>
      <img src="images/bosch-logo.d801fe2509a37d2d.svg">
      <img src="images/LogoSENNACONNECT.png">
    </figure>
  </nav>
  
  <main class="content-wrapper">

    <section class="hero-section hero-menu-section">
      <div class="cards-container cards-container-menu">
        <button class="menu-card" id="btn-edt-plano" type="button">
          <div class="icon-placeholder">
            <img src="images/listar.svg" alt="Listar Plano">
          </div>
          <span class="card-title">Listar Plano</span>
          <small class="subButton">Visualize e gerencie os planos existentes.</small>
          <div class="buttonSquareBlue">
            <img src="images/setaDireitaAzul.svg" alt="">
          </div>
        </button>

        <button class="menu-card" id="btn-novo-plano" type="button">
          <div class="icon-placeholder">
            <img src="images/abrir.svg" alt="Abrir novo Plano">
          </div>
          <span class="card-title">Abrir novo Plano</span>
          <small class="subButton">Crie um novo plano do zero.</small>
          <div class="buttonSquareGreen">
            <img src="images/setaDireitaVerde.svg" alt="">
          </div>
        </button>

        <button class="menu-card" id="btn-operadores" type="button">
          <div class="icon-placeholder">
            <img src="images/oper.svg" alt="Operadores">
          </div>
          <span class="card-title">Operadores</span>
          <small class="subButton">Gerencie os operadores do sistema.</small>
          <div class="buttonSquareBlue">
            <img src="images/setaDireitaAzul.svg" alt="">
          </div>
        </button>
      </div>
    </section>
  </main>

  <footer class="footer-left">
    <button id="btn-voltar" class="btn-voltar" type="button"><img src="images/set_esq_botao.svg" alt="">Voltar</button>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
