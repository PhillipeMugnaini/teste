<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Lotação - Operadores</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header-bar"></header>

  <main class="content-wrapper">
    <div class="logo-container logo-container-login">
      <img src="images/bosch-logo.d801fe2509a37d2d.svg" alt="Bosch Logo" class="logo">
      <img src="images/LogoSENNACONNECT.png" alt="Senna Connect" class="logo-senna">
    </div>

    <section class="hero-section hero-menu-section">
      <div class="cards-container cards-container-menu operators-menu">
        <button class="menu-card" id="btn-add-operador" type="button">
          <div class="icon-placeholder">
            <img src="images/OperadorADD.png" alt="Adicionar Operador">
          </div>
          <span>Adicionar Operador</span>
        </button>

        <button class="menu-card" id="btn-listar-operadores" type="button">
          <div class="icon-placeholder">
            <img src="images/OperadorEDT.png" alt="Editar Operador">
          </div>
          <span>Editar Operador</span>
        </button>
      </div>
    </section>
  </main>

  <footer class="footer-left">
    <button id="btn-voltar-menu" class="btn-voltar" type="button">Voltar</button>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
