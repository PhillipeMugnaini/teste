<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Lotação - Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header-bar"></header>

  <main class="content-wrapper">
    <div class="logo-container logo-container-login">
      <img src="images/bosch-logo.d801fe2509a37d2d.svg" alt="Bosch Logo" class="logo">
      <img src="images/LogoSENNACONNECT.png" alt="Senna Connect" class="logo-senna">
    </div>

    <section class="hero-section hero-menu-section">
      <div class="cards-container cards-container-menu">
        <button class="menu-card" id="btn-edt-plano" type="button">
          <div class="icon-placeholder">
            <img src="images/LapisBtn.png" alt="Editar Plano">
          </div>
          <span>Editar Plano</span>
        </button>

        <button class="menu-card" id="btn-novo-plano" type="button">
          <div class="icon-placeholder">
            <img src="images/+.png" alt="Novo Plano">
          </div>
          <span>Abrir novo Plano</span>
        </button>

        <button class="menu-card" id="btn-operadores" type="button">
          <div class="icon-placeholder">
            <img src="images/operadores.svg" alt="Operadores">
          </div>
          <span>Operadores</span>
        </button>
      </div>
    </section>
  </main>

  <footer class="footer-left">
    <button id="btn-voltar" class="btn-voltar" type="button"><img src="images/set_esq_botao.svg" alt="">Voltar</button>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
