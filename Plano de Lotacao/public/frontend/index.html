<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plano de Lotação</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header-bar"></header>

  <nav>
    <figure>
      <img src="images/bosch-logo.d801fe2509a37d2d.svg">
      <img src="images/LogoSENNACONNECT.png">
    </figure>
  </nav>

  <main class="content-wrapper">
    <section class="hero-section hero-login-section">
      <h1 class=" main-title">Plano de Lotação</h1>
      <span>Informe o EDV para acessar o plano de lotação</span>

      <div class="login-card" id="login-card">  
        <h3>Digite seu EDV</h3>

        <div class="input-icon-container">
          <div class="input-icon-left">
            <i class="fa fa-user-o" aria-hidden="true"></i>
          </div>
          <input
            type="number" 
            id="edv-login"
            class="input-custom-login"
            placeholder="Ex.: 1234567890"
            min="0"
            inputmode="numeric"
            data-max-digits="10"
            required
          >
        </div>

        <p class="input-help-text">Insira o número do seu EDV para continuar.</p>
        <p id="mensagem-login" class="mensagem-form"></p>
      </div>
    </section>
  </main>

  <footer class="footer-action">
    <button class="btn-proxima-tela" type="button">Próximo <img src="images/setaDireitaAzul.svg" alt=""></button>
  </footer>

  <script src="scripts/scripts.js"></script>
</body>
</html>
